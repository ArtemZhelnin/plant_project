<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #36393f;
            color: #dcddde;
            line-height: 1.4;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #2f3136;
            padding: 20px 0;
            border-right: 1px solid #202225;
        }

        .sidebar-header {
            padding: 0 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #202225;
            padding-bottom: 15px;
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .channel {
            padding: 6px 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }

        .channel:hover {
            background: #35373c;
        }

        .channel.active {
            background: #393d42;
            color: #fff;
            border-left: 3px solid #7289da;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 48px;
            background: #36393f;
            border-bottom: 1px solid #202225;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #7289da;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
            color: #fff;
        }

        .message-content {
            flex: 1;
        }

        .username {
            font-weight: 500;
            color: #fff;
            margin-bottom: 2px;
        }

        .timestamp {
            font-size: 12px;
            color: #72767d;
            margin-left: 8px;
            font-weight: 400;
        }

        .message-text {
            color: #dcddde;
            line-height: 1.375;
        }

        .upload-area {
            background: #35373c;
            border: 2px dashed #4f545c;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: #7289da;
            background: #40444b;
        }

        .upload-area.dragover {
            border-color: #7289da;
            background: #40444b;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: #7289da;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 3px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.17s;
        }

        .upload-btn:hover {
            background: #677bc4;
        }

        .results {
            background: #40444b;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }

        .results h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #36393f;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #b9bbbe;
        }

        .result-value {
            color: #fff;
            font-weight: 500;
        }

        .image-preview {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .image-container {
            flex: 1;
            background: #35373c;
            border-radius: 8px;
            padding: 10px;
        }

        .image-container h4 {
            color: #b9bbbe;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .image-container img {
            width: 100%;
            border-radius: 4px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #b9bbbe;
        }

        .error {
            background: #ed4245;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .success {
            background: #3ba55c;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .input-area {
            padding: 20px;
            background: #40444b;
            border-top: 1px solid #202225;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            background: #40444b;
            border: 1px solid #202225;
            color: #dcddde;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-field:focus {
            outline: none;
            border-color: #7289da;
        }

        .send-btn {
            background: #7289da;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .send-btn:hover {
            background: #677bc4;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Plant Analysis</h1>
            </div>
            <div class="channel active" onclick="switchChannel('main')"># main</div>
            <div class="channel" onclick="switchChannel('results')"># results</div>
            <div class="channel" onclick="switchChannel('help')"># help</div>
        </div>

        <div class="main">
            <div class="header">
                <h2 id="channelTitle"># main</h2>
            </div>

            <div class="chat" id="chatContent">
                <div class="message">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        <div class="username">Bot<span class="timestamp">12:00</span></div>
                        <div class="message-text">Привет! Загрузи изображение растения для анализа. Поддерживаются пшеница и руккола.</div>
                    </div>
                </div>

                <div class="upload-area" id="uploadArea">
                    <div style="font-size: 48px; margin-bottom: 15px;">📎</div>
                    <div>Перетащи изображение сюда или выбери файл</div>
                    <div style="margin-top: 15px;">
                        <input type="file" id="fileInput" class="file-input" accept="image/*">
                        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Выбрать файл</button>
                    </div>
                </div>

                <div id="resultsContainer"></div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" class="input-field" id="messageInput" placeholder="Напиши сообщение..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const chatContent = document.getElementById('chatContent');
        const resultsContainer = document.getElementById('resultsContainer');
        const messageInput = document.getElementById('messageInput');
        const channelTitle = document.getElementById('channelTitle');

        let currentChannel = 'main';

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                addMessage('Bot', 'Пожалуйста, выберите изображение', 'error');
                return;
            }

            addMessage('User', `Загружен файл: ${file.name}`, 'user');
            addMessage('Bot', 'Анализирую изображение...', 'bot');

            const reader = new FileReader();
            reader.onload = (e) => {
                const imageData = e.target.result;
                analyzeImage(imageData);
            };
            reader.readAsDataURL(file);
        }

        function analyzeImage(imageData) {
            setTimeout(() => {
                const mockResults = {
                    root_length_mm: 45.2,
                    stem_length_mm: 28.7,
                    root_area_mm2: 125.4,
                    stem_area_mm2: 89.3,
                    leaf_area_mm2: 342.1
                };

                addMessage('Bot', 'Анализ завершен! Результаты:', 'bot');
                showResults(imageData, mockResults);
            }, 2000);
        }

        function showResults(imageData, results) {
            const resultsHtml = `
                <div class="results">
                    <h3>📊 Результаты измерений</h3>
                    <div class="result-item">
                        <span class="result-label">Длина корня:</span>
                        <span class="result-value">${results.root_length_mm} мм</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Длина стебля:</span>
                        <span class="result-value">${results.stem_length_mm} мм</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Площадь корня:</span>
                        <span class="result-value">${results.root_area_mm2} мм²</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Площадь стебля:</span>
                        <span class="result-value">${results.stem_area_mm2} мм²</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Площадь листьев:</span>
                        <span class="result-value">${results.leaf_area_mm2} мм²</span>
                    </div>
                </div>

                <div class="image-preview">
                    <div class="image-container">
                        <h4>Оригинал</h4>
                        <img src="${imageData}" alt="Оригинал">
                    </div>
                    <div class="image-container">
                        <h4>Сегментация</h4>
                        <img src="${imageData}" alt="Сегментация">
                    </div>
                </div>
            `;

            resultsContainer.innerHTML = resultsHtml;
        }

        function addMessage(username, text, type = 'normal') {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const avatar = type === 'user' ? '👤' : '🤖';
            const timestamp = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="message-content">
                    <div class="username">${username}<span class="timestamp">${timestamp}</span></div>
                    <div class="message-text">${text}</div>
                </div>
            `;
            
            chatContent.insertBefore(messageDiv, uploadArea);
            chatContent.scrollTop = chatContent.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                addMessage('User', message, 'user');
                messageInput.value = '';
                
                // Simple bot responses
                setTimeout(() => {
                    if (message.toLowerCase().includes('привет')) {
                        addMessage('Bot', 'Привет! Загрузи изображение для анализа.', 'bot');
                    } else if (message.toLowerCase().includes('помощь')) {
                        addMessage('Bot', 'Поддерживаемые форматы: JPG, PNG. Анализируем пшеницу и рукколу.', 'bot');
                    } else {
                        addMessage('Bot', 'Понял. Загрузи изображение для начала анализа.', 'bot');
                    }
                }, 500);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function switchChannel(channel) {
            currentChannel = channel;
            
            // Update active channel
            document.querySelectorAll('.channel').forEach(ch => {
                ch.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update header
            channelTitle.textContent = `# ${channel}`;
            
            // Clear chat and show channel-specific content
            chatContent.innerHTML = '';
            resultsContainer.innerHTML = '';
            
            if (channel === 'main') {
                chatContent.innerHTML = `
                    <div class="message">
                        <div class="avatar">🤖</div>
                        <div class="message-content">
                            <div class="username">Bot<span class="timestamp">12:00</span></div>
                            <div class="message-text">Привет! Загрузи изображение растения для анализа.</div>
                        </div>
                    </div>
                    <div class="upload-area" id="uploadArea">
                        <div style="font-size: 48px; margin-bottom: 15px;">📎</div>
                        <div>Перетащи изображение сюда или выбери файл</div>
                        <div style="margin-top: 15px;">
                            <input type="file" id="fileInput" class="file-input" accept="image/*">
                            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Выбрать файл</button>
                        </div>
                    </div>
                    <div id="resultsContainer"></div>
                `;
                // Re-attach event listeners
                const newUploadArea = document.getElementById('uploadArea');
                const newFileInput = document.getElementById('fileInput');
                
                newUploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    newUploadArea.classList.add('dragover');
                });
                
                newUploadArea.addEventListener('dragleave', () => {
                    newUploadArea.classList.remove('dragover');
                });
                
                newUploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    newUploadArea.classList.remove('dragover');
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        handleFile(files[0]);
                    }
                });
                
                newFileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        handleFile(e.target.files[0]);
                    }
                });
            } else if (channel === 'results') {
                chatContent.innerHTML = `
                    <div class="message">
                        <div class="avatar">🤖</div>
                        <div class="message-content">
                            <div class="username">Bot<span class="timestamp">12:00</span></div>
                            <div class="message-text">Здесь будут отображаться результаты анализов.</div>
                        </div>
                    </div>
                `;
            } else if (channel === 'help') {
                chatContent.innerHTML = `
                    <div class="message">
                        <div class="avatar">🤖</div>
                        <div class="message-content">
                            <div class="username">Bot<span class="timestamp">12:00</span></div>
                            <div class="message-text">
                                <strong>Справка:</strong><br>
                                • Поддерживаемые форматы: JPG, PNG<br>
                                • Анализируем: пшеница, руккола<br>
                                • Измеряем: длину корня/стебля, площадь частей растения<br>
                                • Просто перетащи файл в чат или нажми "Выбрать файл"
                            </div>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
